<!-- ⚡ OPTIMIZED HTML <head> TEMPLATE
     Copy this template and customize for your site
     Follows best practices for FCP optimization
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 1: CRITICAL PERFORMANCE OPTIMIZATIONS
       These must be at the very top of <head>
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 🚀 CRITICAL: Inline CSS (5-10KB max)
       This prevents render-blocking and allows immediate painting.
       Only include styles needed for above-the-fold content.
  -->
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    
    /* Variables */
    :root {
      --color-primary: #ff8c00;
      --color-bg: #000814;
      --color-text: #ffffff;
    }
    
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 2: PRECONNECT TO EXTERNAL DOMAINS
       Establish DNS connection early - reduces time to first byte by ~100ms
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- 🔗 Preconnect to Google Fonts (if using) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- 🔗 Preconnect to Font Service (if using Fontshare, etc) -->
  <link rel="preconnect" href="https://api.fontshare.com" />

  <!-- 🔗 DNS Prefetch for analytics (lighter than preconnect) -->
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
  <link rel="dns-prefetch" href="https://cdn.dialogflow.com" />

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 3: FONTS
       Use font-display: swap to show fallback first, then swap when loaded
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- ✅ GOOD: Use Next.js Font Optimization -->
  <!-- (Fonts embedded in build, no network request needed) -->
  <!-- This is handled by Next.js automatically via font import in layout.tsx -->

  <!-- OR: ✅ Use Google Fonts with preload strategy -->
  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
    />
  </noscript>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 4: DEFERRED STYLES
       Load non-critical CSS asynchronously using media="print" trick
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- ✅ Load deferred.css in background (won't block render) -->
  <link
    rel="stylesheet"
    href="/deferred.css"
    media="print"
    onload="this.media='all';this.onload=null;"
  />
  <!-- Fallback if JavaScript disabled -->
  <noscript>
    <link rel="stylesheet" href="/deferred.css" media="all" />
  </noscript>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 5: META TAGS
       SEO and social sharing optimization
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <title>UnicomTeam — We Craft Software Teams Love</title>
  <meta
    name="description"
    content="Elite strategy, high-fidelity design, and bespoke engineering."
  />
  <meta name="theme-color" content="#000814" />
  <meta name="color-scheme" content="dark light" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="UnicomTeam — We Craft Software Teams Love" />
  <meta property="og:description" content="Premium software engineering & design" />
  <meta property="og:image" content="https://example.com/og-image.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="UnicomTeam — Premium Software Engineering" />
  <meta name="twitter:image" content="https://example.com/og-image.jpg" />

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 6: ICONS & FAVICONS
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 7: RESOURCE HINTS (OPTIONAL)
       Preload/prefetch resources you know will be needed
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- Preload critical images (hero, logo, etc) -->
  <link rel="preload" href="/images/hero-bg.jpg" as="image" />
  <link rel="preload" href="/images/logo.png" as="image" />

  <!-- Prefetch likely-to-be-needed resources -->
  <link rel="prefetch" href="/next-page.html" />

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 8: DO NOT PUT ANY SCRIPTS HERE!
       All scripts go in <body> at the bottom
       ❌ ❌ ❌ NO SYNCHRONOUS SCRIPTS IN HEAD ❌ ❌ ❌
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- ✅ Placeholder comment reminding you not to add scripts here -->
  <!-- Scripts belong at end of <body> with async/defer attributes -->

</head>
<body>
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- CONTENT GOES HERE
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <header>
    <h1>My Site</h1>
  </header>

  <main class="hero">
    <h2>Welcome</h2>
  </main>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- PART 9: SCRIPTS (at end of body, NOT in head!)
       Order by priority: critical → important → optional
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- CRITICAL: Only if absolutely necessary for page render
       ⚠️ These WILL block FCP - use sparingly! -->
  <!-- <script src="/critical.js"></script> -->

  <!-- IMPORTANT: Load after page render
       ✅ Use for analytics, feature flags, etc -->
  <script
    src="https://www.googletagmanager.com/gtag/js?id=GA_ID"
    async
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'GA_ID');
  </script>

  <!-- OPTIONAL: Load in background
       ✅ Use for chat, ads, widgets -->
  <script async src="https://cdn.example.com/chat.js"></script>

  <!-- React/Framework scripts (with defer) -->
  <script defer src="/js/main.js"></script>

  <!-- Inline initialization script (after main bundle) -->
  <script>
    // Initialize app after all scripts loaded
    if (window.App) {
      window.App.init();
    }
  </script>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- NEXT.JS SPECIFIC
       If using Next.js, use the Script component instead
  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- Replace inline scripts above with: -->
  <!-- 
  <Script src="..." strategy="afterInteractive" />
  <Script src="..." strategy="lazyOnload" />
  -->

</body>
</html>

<!-- ════════════════════════════════════════════════════════════════════ -->
<!-- OPTIMIZATION CHECKLIST
═════════════════════════════════════════════════════════════════════════ 

✅ Critical CSS inlined (< 10KB)
✅ No external stylesheets in <head> (deferred CSS loaded async)
✅ Fonts preconnected
✅ No @import in CSS files
✅ No synchronous scripts in <head>
✅ All scripts have async/defer or strategy prop
✅ Analytics scripts use afterInteractive
✅ Optional features use lazyOnload
✅ Meta tags present (title, description, og:)
✅ Icons configured
✅ Preload for critical images
✅ FCP target: < 1.2s
✅ LCP target: < 2.5s
✅ CLS target: < 0.1

═════════════════════════════════════════════════════════════════════════ -->
